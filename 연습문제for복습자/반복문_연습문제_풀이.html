<script>
/* ---------- 문제 데이터 ---------- */
const DATA = [
 {no:"4-1", tag:"조건식", q:
`다음 문장들을 조건식으로 표현하라. (빈칸 ◻︎ 채우기)

1. x가 10 초과 20 미만
   ◻︎
2. ch가 공백도 탭도 아님
   ◻︎
3. ch가 'x' 또는 'X'
   ◻︎
4. ch가 숫자('0'~'9')
   ◻︎
5. ch가 영문자(대/소문자)
   ◻︎
6. year가 윤년(400배수 이거나 4배수&100배수 아님)
   ◻︎
7. powerOn이 false
   ◻︎
8. str이 "yes"
   ◻︎`,
  a:
`<pre><code>1. x &gt; 10 &amp;&amp; x &lt; 20
2. ch != ' ' &amp;&amp; ch != '\\t'
3. ch == 'x' || ch == 'X'
4. ch &gt;= '0' &amp;&amp; ch &lt;= '9'
5. (ch &gt;= 'a' &amp;&amp; ch &lt;= 'z') || (ch &gt;= 'A' &amp;&amp; ch &lt;= 'Z')
6. (year % 400 == 0) || (year % 4 == 0 &amp;&amp; year % 100 != 0)
7. !powerOn          // powerOn == false 와 같음
8. str.equals("yes") // 문자열은 == 아니라 equals!</code></pre>`,
  why:`&&=그리고, ||=또는. 범위는 두 조건을 &&로 묶고, 문자열 비교는 반드시 .equals()`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>범위(1번)</b> : 수학처럼 10 &lt; x &lt; 20 로 못 씁니다. 자바는 비교를 둘로 쪼개 <code>x &gt; 10 && x &lt; 20</code> 처럼 &&(그리고)로 연결합니다.</li>
<li><b>아니다(2번)</b> : "공백이 아니다" = != 연산자. 탭은 특수문자라 <code>'\\t'</code>로 표기. 공백도 탭도 <u>둘 다</u> 아니어야 하므로 &&.</li>
<li><b>또는(3번)</b> : 소문자 x <u>이거나</u> 대문자 X → 둘 중 하나만 맞아도 true여야 하므로 ||.</li>
<li><b>문자 범위(4·5번)</b> : 문자도 속으론 번호(유니코드)라 크기 비교가 됩니다. '0'~'9', 'a'~'z', 'A'~'Z'가 연속 배치되어 있어 &gt;= &lt;= 로 범위 판단 가능.</li>
<li><b>윤년(6번)</b> : ① 400의 배수 → 무조건 윤년, ② 4의 배수인데 100의 배수는 아님 → 윤년. "①또는②"라서 ||, ②의 내부는 &&. 괄호로 묶어 계산 순서를 명확히!</li>
<li><b>부정(7번)</b> : ! 는 참↔거짓 뒤집기. powerOn이 false면 !powerOn은 true.</li>
<li><b>문자열(8번)</b> : 내용 비교는 <code>.equals()</code>. ==는 "같은 상자(주소)인지"를 봐서, 내용이 같아도 false가 나올 수 있습니다.</li>
</ol></div>
<div class="mistake">⚠️ <b>흔한 실수</b><br>· <code>10 &lt; x &lt; 20</code> 그대로 쓰기 → 컴파일 에러<br>· <code>str == "yes"</code> → 어떤 땐 되고 어떤 땐 안 되는 최악의 버그<br>· 6번에서 괄호 생략 → &&가 ||보다 먼저 계산돼 의도가 꼬임</div>`},

 {no:"4-2", tag:"합 계산", q:
`1부터 20까지의 정수 중 2 또는 3의 배수가 아닌 수의 총합을 구하시오.

public class Ex4_2 {
    public static void main(String[] args) {
        int sum = 0;
        for(int i = 1; i <= 20; i++) {
            if( ◻︎ ) {   // 2로도 3으로도 안 나눠짐
                sum += i;
            }
        }
        System.out.println(sum);
    }
}`,
  a:
`<pre><code>if(i % 2 != 0 &amp;&amp; i % 3 != 0) {
    sum += i;
}
</code></pre>`,
  why:`"2 또는 3의 배수가 아님" = "2의 배수도 아니고 && 3의 배수도 아님"`,
  res:`✅ 정답 : 73`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>배수 판별법</b> : i가 2의 배수 ⇔ <code>i % 2 == 0</code> (나머지 0). "배수가 아니다"는 <code>!= 0</code>.</li>
<li><b>조건 뒤집기(핵심!)</b> : "2 <u>또는</u> 3의 배수" 가 <u>아닌</u> 수 = "2의 배수도 아니<u>고</u> 3의 배수도 아닌" 수. 또는(||)을 통째로 부정하면 그리고(&&)로 바뀝니다.</li>
<li><b>누적 패턴</b> : sum=0에서 시작 → 조건 통과한 i만 <code>sum += i</code>로 차곡차곡 쌓기.</li>
</ol></div>
<table class="trace"><tr><th>i</th><th>2의 배수?</th><th>3의 배수?</th><th>포함?</th><th>sum</th></tr>
<tr><td>1</td><td>X</td><td>X</td><td>⭕</td><td>1</td></tr>
<tr><td>2~4</td><td colspan="2">하나라도 O</td><td>❌</td><td>1</td></tr>
<tr><td>5</td><td>X</td><td>X</td><td>⭕</td><td>6</td></tr>
<tr><td>6</td><td>O</td><td>O</td><td>❌</td><td>6</td></tr>
<tr><td>7</td><td>X</td><td>X</td><td>⭕</td><td>13</td></tr>
<tr><td colspan="5">… 포함되는 수 : 1, 5, 7, 11, 13, 17, 19 → 합 <b>73</b></td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b> : 조건을 <code>i%2!=0 || i%3!=0</code> (또는)로 쓰기 → 6의 배수만 빠져서 답이 <b>152</b>로 나옵니다. 이 값이 나오면 ||를 &&로!</div>`},

 {no:"4-3", tag:"합 계산", q:
`1+(1+2)+(1+2+3)+...+(1+2+...+10)의 결과를 계산하시오.

public class Ex4_3 {
    public static void main(String[] args) {
        int total = 0;
        for(int k = 1; k <= 10; k++) {
            ◻︎   // 1부터 k까지 더하는 안쪽 반복
        }
        System.out.println(total);
    }
}`,
  a:
`<pre><code>for(int j = 1; j &lt;= k; j++) {
    total += j;
}
</code></pre>`,
  why:`바깥=몇 번째 괄호(k), 안쪽=그 괄호 내용물(1~k) 누적. 안쪽 한계가 k인 게 핵심`,
  res:`✅ 정답 : 220`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>식의 구조 파악</b> : k번째 괄호 = (1+2+…+k). 이런 괄호가 k=1부터 10까지 10개 있고, 전부 더하는 문제.</li>
<li><b>바깥 for(k)</b> : "지금 몇 번째 괄호인가"를 담당. k를 1→10.</li>
<li><b>안쪽 for(j)</b> : 그 괄호의 내용물을 만드는 담당. j를 1→<b>k</b>까지 total에 누적. 괄호마다 길이가 다르므로 안쪽 한계가 고정값이 아니라 <b>바깥 변수 k</b>여야 합니다.</li>
</ol></div>
<table class="trace"><tr><th>k(괄호)</th><th>이번에 더해지는 값</th><th>total</th></tr>
<tr><td>1</td><td>1</td><td>1</td></tr>
<tr><td>2</td><td>1+2 = 3</td><td>4</td></tr>
<tr><td>3</td><td>1+2+3 = 6</td><td>10</td></tr>
<tr><td>4</td><td>10</td><td>20</td></tr>
<tr><td>…</td><td>…</td><td>…</td></tr>
<tr><td>10</td><td>55</td><td><b>220</b></td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b> : 안쪽 조건을 <code>j &lt;= 10</code>으로 고정 → 매번 55씩 더해져 <b>550</b>이 나옵니다. 이 값이 나오면 안쪽 한계를 k로!</div>`},

 {no:"4-4", tag:"합 계산", q:
`1+(-2)+3+(-4)+... 식으로 더할 때, 몇까지 더해야 합이 100 이상이 되는지 구하시오.

public class Ex4_4 {
    public static void main(String[] args) {
        int sum = 0, i = 1;
        while(sum < 100) {
            if( ◻︎ ) sum += i;   // 홀수면 더하기
            else     sum -= i;   // 짝수면 빼기
            if(sum >= 100) break;
            i++;
        }
        System.out.println(i);
    }
}`,
  a:
`<pre><code>if(i % 2 == 1) sum += i;   // 홀수 → 더하기
else          sum -= i;   // 짝수 → 빼기
</code></pre>`,
  why:`홀수는 +, 짝수는 −. 부호는 i % 2로 판단, 100 도달 즉시 break로 그 i를 지킴`,
  res:`✅ 정답 : 199`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>부호 규칙 찾기</b> : 1(+), 2(−), 3(+), 4(−)… → <u>홀수는 더하고 짝수는 뺀다</u>. 홀짝은 <code>i % 2</code>로 판별(나머지 1이면 홀수).</li>
<li><b>왜 while인가</b> : "몇 번 반복할지"를 미리 모르고 "합≥100"이라는 <u>목표 도달</u>까지 돌리는 문제 → 횟수 기반 for보다 조건 기반 while이 자연스럽습니다.</li>
<li><b>도달 즉시 break</b> : 더한 <u>직후</u> 검사해서 100 이상이면 바로 탈출. i++가 실행되기 전에 멈춰야 "합을 100으로 만든 바로 그 수"가 답으로 남습니다.</li>
</ol></div>
<table class="trace"><tr><th>i</th><th>연산</th><th>sum</th></tr>
<tr><td>1</td><td>+1</td><td>1</td></tr>
<tr><td>2</td><td>−2</td><td>−1</td></tr>
<tr><td>3</td><td>+3</td><td>2</td></tr>
<tr><td>4</td><td>−4</td><td>−2</td></tr>
<tr><td>5</td><td>+5</td><td>3</td></tr>
<tr><td colspan="3">패턴 발견 : 홀수 i까지 더한 순간 sum = (i+1)÷2<br>→ (i+1)÷2 = 100 이 되는 순간의 <b>i = 199</b></td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b> : break 없이 while 조건만 믿기 → i++가 먼저 실행된 뒤 조건검사로 빠져나와 <b>200</b>이 출력됩니다. 1 큰 값이 나오면 break 위치를 확인!</div>`},

 {no:"4-5", tag:"for→while", q:
`다음 for문을 while문으로 변경하시오.

for(int i=0; i<=10; i++) {
    for(int j=0; j<=i; j++)
        System.out.print("*");
    System.out.println();
}`,
  a:
`<pre><code>int i = 0;                 // ① 초기화 (밖으로)
while(i &lt;= 10) {           // ② 조건
    int j = 0;             // ★ 안쪽 초기화는 바깥 while 안!
    while(j &lt;= i) {
        System.out.print("*");
        j++;               // ③ 증감 (안쪽 끝)
    }
    System.out.println();
    i++;                   // ③ 증감 (바깥 끝)
}
</code></pre>`,
  why:`for(①초기화; ②조건; ③증감) 3조각 → ①밖 / ②while() / ③블록 끝으로 이사`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>for의 3조각 분리</b> : <code>for(①초기화; ②조건; ③증감)</code> → ①은 while <u>위</u>로, ②는 while(  ) 괄호 안으로, ③은 블록 <u>맨 끝</u>으로 이사시키면 끝.</li>
<li><b>바깥 i 변환</b> : int i=0 을 위로 → while(i&lt;=10) → 블록 끝에 i++.</li>
<li><b>안쪽 j의 함정(핵심!)</b> : <code>int j=0</code> 초기화는 반드시 <u>바깥 while 안쪽</u>에 있어야 합니다. 줄이 바뀔 때마다 j가 0부터 다시 시작해야 별이 1개→2개→3개… 로 늘어납니다.</li>
<li><b>③의 위치</b> : j++는 print 다음(안쪽 블록 끝). 순서가 바뀌면 별 개수가 달라집니다.</li>
</ol></div>
<div class="mistake">⚠️ <b>흔한 실수</b> : int j=0을 맨 위(바깥 while 밖)에 선언 → 첫 줄 이후 j가 이미 커져 있어서 둘째 줄부터 별이 안 찍힙니다. "안쪽 반복의 초기화는 안쪽 반복 <u>직전</u>!"</div>`},

 {no:"4-7", tag:"랜덤", q:

 {no:"4-8", tag:"완전탐색", q:

 {no:"4-9", tag:"문자열/charAt", q:

String str = "12345";

    ◻︎
}

  a:

</code></pre>`,
  why:`charAt(i)는 '문자'. '5'−'0' = 53−48 = 5 → 문자를 진짜 숫자로 바꾸는 트릭`,
  res:`✅ 정답 : sum=15`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>charAt(i)</b> : 문자열의 i번째 <u>문자 1개</u>를 꺼냅니다(0번부터 셈). "12345".charAt(0) → 문자 '1'.</li>
<li><b>문자 ≠ 숫자</b> : 문자 '1'은 숫자 1이 아니라 유니코드 번호 <b>49</b>를 가진 "글자"입니다. 그대로 더하면 엉뚱한 값이 나옵니다.</li>
<li><b>변환 트릭 −'0'</b> : '0'~'9'는 48~57에 <u>연속</u> 배치 → <code>'5' − '0'</code> = 53 − 48 = <b>5</b>. 어떤 숫자문자든 −'0' 하면 진짜 숫자가 됩니다. (암기 필수 트릭!)</li>
</ol></div>
<table class="trace"><tr><th>i</th><th>charAt(i)</th><th>−'0' 결과</th><th>sum</th></tr>
<tr><td>0</td><td>'1' (49)</td><td>1</td><td>1</td></tr>
<tr><td>1</td><td>'2' (50)</td><td>2</td><td>3</td></tr>
<tr><td>2</td><td>'3' (51)</td><td>3</td><td>6</td></tr>
<tr><td>3</td><td>'4' (52)</td><td>4</td><td>10</td></tr>
<tr><td>4</td><td>'5' (53)</td><td>5</td><td><b>15</b></td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b> : <code>sum += str.charAt(i);</code> (−'0' 누락) → 49+50+51+52+53 = <b>255</b>가 출력됩니다. 255가 보이면 100% 변환 누락!</div>`},

 {no:"4-12", tag:"중첩 for", q:
`구구단 일부를 출력하시오. (2~4단 / 5~7단 / 8~9단, 각 x1~x3, 가로 배치)

2*1=2   3*1=3   4*1=4
2*2=4   3*2=6   4*2=8
2*3=6   3*3=9   4*3=12
... (5~7단, 8~9단 이어짐)`,
  a:
`<pre><code>for(int base = 2; base &lt;= 8; base += 3) {   // 시작단 2,5,8
    for(int i = 1; i &lt;= 3; i++) {           // 곱하는 수 1~3
        for(int dan = base; dan &lt;= base+2 &amp;&amp; dan &lt;= 9; dan++) {
            System.out.print(dan + "*" + i + "=" + (dan*i) + "\\t");
        }
        System.out.println();
    }
    System.out.println();                  // 블록 사이 빈 줄
}
</code></pre>`,
  why:`블록(base:2,5,8) → 줄(i:1~3) → 가로 단(dan:base~base+2). 8단 블록은 dan<=9로 제한`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>출력 구조 분석(가장 중요!)</b> : 세로로 3블록(2~4단 / 5~7단 / 8~9단), 블록마다 3줄(×1~×3), 한 줄엔 가로로 최대 3개 단. → 반복 3겹 필요.</li>
<li><b>1겹: 블록(base)</b> : 각 블록의 시작 단이 2, 5, 8 → 3씩 커지므로 <code>base += 3</code>.</li>
<li><b>2겹: 줄(i)</b> : 곱하는 수 1~3. 화면의 "한 줄"을 담당.</li>
<li><b>3겹: 가로 단(dan)</b> : base부터 base+2까지. 단, 마지막 블록(8)은 8,9만 존재 → <code>&& dan &lt;= 9</code> 안전장치로 10단 출력을 막음.</li>
<li><b>열 맞춤</b> : print + <code>"\\t"</code>(탭)으로 가로 배치, 한 줄 끝나면 println(), 블록 끝나면 빈 줄 하나 더.</li>
</ol></div>
<table class="trace"><tr><th>base</th><th>i</th><th>dan 반복</th><th>출력되는 줄</th></tr>
<tr><td>2</td><td>1</td><td>2,3,4</td><td>2*1=2  3*1=3  4*1=4</td></tr>
<tr><td>2</td><td>2</td><td>2,3,4</td><td>2*2=4  3*2=6  4*2=8</td></tr>
<tr><td>8</td><td>1</td><td>8,9 (dan≤9!)</td><td>8*1=8  9*1=9</td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b><br>· i와 dan 순서 바꿈 → 단이 가로가 아니라 세로로 나열됩니다. "한 줄에 여러 단" = <u>줄(i)이 바깥, 단(dan)이 안</u>!<br>· <code>dan&lt;=9</code> 빠뜨림 → 존재하지 않는 10단이 출력됨.</div>`},

 {no:"4-13", tag:"문자열/charAt", q:
`문자열 value가 숫자인지 판별하시오. (1) 채우기

String value = "12o34";
char ch = ' ';
boolean isNumber = true;
for(int i = 0; i < value.length(); i++) {
    ch = value.charAt(i);
    ◻︎   // 숫자 범위 밖이면 isNumber=false 후 break
}`,
  a:
`<pre><code>if(ch &lt; '0' || ch &gt; '9') {
    isNumber = false;
    break;              // 더 볼 필요 없이 종료
}
// 결과 : 12o34는 숫자가 아닙니다.
</code></pre>`,
  why:`깃발(flag) 패턴: 기본 true → 위반자 1명이라도 발견 즉시 false + break`,
  detail:
`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>
<li><b>깃발(flag) 패턴</b> : isNumber=true(일단 무죄 추정)로 시작 → 위반자(숫자 아닌 문자)를 <u>한 글자라도</u> 발견하면 false로 뒤집고 수사 종료(break). 검증 문제의 만능 패턴입니다.</li>
<li><b>"숫자가 아니다" 조건 만들기</b> : 숫자<u>이면</u> <code>ch&gt;='0' && ch&lt;='9'</code> (4-1의 4번). 이걸 뒤집으면 <code>ch&lt;'0' || ch&gt;'9'</code>. (&&를 뒤집으면 ||!)</li>
<li><b>break의 이유</b> : 하나라도 걸리면 결과는 이미 "숫자 아님"으로 확정 → 남은 글자를 볼 필요가 없어 즉시 종료. 효율도 좋고 논리도 안전.</li>
</ol></div>
<table class="trace"><tr><th>i</th><th>ch</th><th>숫자?</th><th>isNumber</th></tr>
<tr><td>0</td><td>'1'</td><td>O</td><td>true</td></tr>
<tr><td>1</td><td>'2'</td><td>O</td><td>true</td></tr>
<tr><td>2</td><td>'o'</td><td><b>X</b></td><td><b>false → break!</b></td></tr>
<tr><td colspan="4">3, 4번째 글자는 아예 검사 안 함 (이미 확정)</td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b> : <code>else { isNumber = true; }</code>를 붙이기 → 마지막 글자만 숫자면 다시 true로 덮여버립니다. 깃발은 <u>한 번 내리면 끝</u>, 되돌리는 코드 금지!</div>`},

 {no:"4-14", tag:"랜덤/게임", q:
`숫자 맞추기 게임을 완성하시오. (1)(2) 채우기

`<div class="steps"><b class="tt">📖 단계별 풀이</b><ol>

<tr><td>76</td><td>같음!</td><td>"맞췄습니다" + 6회 → break</td></tr>
<tr><td colspan="3">💡 절반씩 좁히면(이분탐색) 1~100은 최대 7번 안에 무조건 맞힘!</td></tr></table>
<div class="mistake">⚠️ <b>흔한 실수</b><br>· break 빠뜨림 → 맞혀도 게임이 안 끝나는 무한루프!<br>· 부등호 안내 반대로 → "더 큰 수를"만 계속 나오면 &gt; &lt; 방향을 뒤집어 쓴 것.</div>`}
];

/* ---------- 렌더링 ---------- */
const list = document.getElementById('quizList');
const KEY = 'ch4_workbook_v1';
let state = {};
try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ state = {}; }

DATA.forEach((d, idx) => {
  const el = document.createElement('div');
  el.className = 'q';
  el.innerHTML = `
    <div class="qhead">
      <span class="qno">${d.no}</span>
      <span class="tag">${d.tag}</span>
    </div>
    <div class="qbody">${escapeText(d.q)}</div>
    <button class="toggle" data-i="${idx}">
      <span>💡 정답 + 상세풀이 보기 / 숨기기</span><span class="arrow">▶</span>
    </button>
    <div class="answer" id="ans${idx}">
      ${d.a}
      ${d.res ? `<div class="result">${d.res}</div>` : ``}
      <div class="why">🔑 ${d.why}</div>
      ${d.detail || ``}
      <div class="chkrow">
        <div class="chk ok" data-i="${idx}" data-v="ok">⭕ 맞았어요</div>
        <div class="chk bad" data-i="${idx}" data-v="bad">❌ 틀렸어요</div>
      </div>
    </div>`;
  list.appendChild(el);
});

/* 토글 */
list.querySelectorAll('.toggle').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const i = btn.dataset.i;
    const ans = document.getElementById('ans'+i);
    ans.classList.toggle('show');
    btn.classList.toggle('open');
  });
});

/* 채점 체크 */
list.querySelectorAll('.chk').forEach(c=>{
  const i = c.dataset.i, v = c.dataset.v;
  if(state[i] === v) c.classList.add('on');
  c.addEventListener('click', ()=>{
    if(state[i] === v){ delete state[i]; }
    else { state[i] = v; }
    document.querySelectorAll(`.chk[data-i="${i}"]`).forEach(x=>{
      x.classList.toggle('on', state[i] === x.dataset.v);
    });
    save();
  });
});

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  updateDash();
}

function updateDash(){
  const tot = DATA.length;
  let ok=0, bad=0;
  Object.values(state).forEach(v=>{ if(v==='ok')ok++; else if(v==='bad')bad++; });
  const done = ok+bad;
  const p = tot ? Math.round(done/tot*100) : 0;
  document.getElementById('totN').textContent = tot;
  document.getElementById('doneN').textContent = done;
  document.getElementById('okN').textContent = ok;
  document.getElementById('badN').textContent = bad;
  document.getElementById('ringTxt').textContent = p+'%';
  document.getElementById('ring').style.setProperty('--p', p);
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('진행 상황을 모두 초기화할까요?')){
    state = {}; save();
    document.querySelectorAll('.chk').forEach(x=>x.classList.remove('on'));
  }
});

/* 다운로드 (자기 자신 저장) */
document.getElementById('dlBtn').addEventListener('click', ()=>{
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Ch4LoopWorkbook.html';
  a.click();
  URL.revokeObjectURL(a.href);
});

function escapeText(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/◻︎/g,'<span class="blank">◻︎</span>');
}

updateDash();
</script>
</body>
</html>
